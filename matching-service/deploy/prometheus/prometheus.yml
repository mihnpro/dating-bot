global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: matching-service
    metrics_path: /metrics
    static_configs:
      - targets:
          - matching-service:8081
        labels:
          service: matching-service

  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
