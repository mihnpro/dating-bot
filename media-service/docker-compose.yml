services:
  media-service:
    build:
      context: ..
      dockerfile: media-service/Dockerfile
    container_name: media-service
    ports:
      - "50054:50054"
      - "8083:8083"
    environment:
      GRPC_PORT: 50054
      HTTP_PORT: 8083
      POSTGRES_HOST: media-postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: media_db
      POSTGRES_SSLMODE: disable
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      RABBITMQ_EXCHANGE: dating.events
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: photos
      MINIO_USE_SSL: "false"
      MINIO_PUBLIC_HOST: http://localhost:9000
      SERVICE_NAME: media-service
    depends_on:
      media-postgres:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - dating-bot-net

  media-postgres:
    image: postgres:16-alpine
    container_name: media-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: media_db
    ports:
      - "5436:5432"
    volumes:
      - media-pg-data:/var/lib/postgresql/data
      - ./deploy/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - dating-bot-net

  minio:
    image: minio/minio:latest
    container_name: dating-bot-minio
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - dating-bot-net

volumes:
  media-pg-data:
  minio-data:

networks:
  dating-bot-net:
    external: true
    name: dating-bot-net
