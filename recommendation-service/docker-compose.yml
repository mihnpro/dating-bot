services:
  recommendation-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: recommendation-service
    ports:
      - "50053:50053"
      - "8082:8082"
    environment:
      POSTGRES_HOST: recommendation-postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rating_db
      POSTGRES_SSLMODE: disable
      RABBITMQ_URL: amqp://guest:guest@dating-bot-rabbitmq:5672/
      RABBITMQ_EXCHANGE: dating.events
      REDIS_ADDR: recommendation-redis:6379
      REDIS_PASSWORD: ""
      REDIS_DB: 0
      REDIS_CACHE_TTL_SECONDS: 3600
      GRPC_PORT: 50053
      HTTP_PORT: 8082
      SERVICE_NAME: recommendation-service
      USER_PROFILE_SERVICE_ADDR: user-profile-service:50051
      MATCHING_SERVICE_ADDR: matching-service:50052
      WORKER_POOL_SIZE: 8
      WORKER_QUEUE_SIZE: 512
      WORKER_RECALC_INTERVAL_MINUTES: 30
    depends_on:
      recommendation-postgres:
        condition: service_healthy
      recommendation-redis:
        condition: service_healthy
    networks:
      - dating-bot-net
    restart: unless-stopped
    labels:
      com.docker.compose.project: dating-bot
      com.docker.compose.service: recommendation-service

  recommendation-postgres:
    image: postgres:16-alpine
    container_name: recommendation-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rating_db
    ports:
      - "5435:5432"
    volumes:
      - recommendation-pg-data:/var/lib/postgresql/data
      - ./deploy/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - dating-bot-net

  recommendation-redis:
    image: redis:7-alpine
    container_name: recommendation-redis
    ports:
      - "6380:6379"
    volumes:
      - recommendation-redis-data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - dating-bot-net

volumes:
  recommendation-pg-data:
  recommendation-redis-data:

networks:
  dating-bot-net:
    external: true
    name: dating-bot-net
