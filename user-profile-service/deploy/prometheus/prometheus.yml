global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: local

scrape_configs:
  # ── Go business services ───────────────────────────────────────────────────
  - job_name: user-profile-service
    metrics_path: /metrics
    static_configs:
      - targets:
          - user-profile-service:8080
        labels:
          service: user-profile-service

  - job_name: matching-service
    metrics_path: /metrics
    static_configs:
      - targets:
          - matching-service:8081
        labels:
          service: matching-service

  - job_name: recommendation-service
    metrics_path: /metrics
    static_configs:
      - targets:
          - recommendation-service:8082
        labels:
          service: recommendation-service

  - job_name: chat-service
    metrics_path: /metrics
    static_configs:
      - targets:
          - chat-service:8083
        labels:
          service: chat-service

  - job_name: media-service
    metrics_path: /metrics
    static_configs:
      - targets:
          - media-service:8083
        labels:
          service: media-service

  - job_name: gateway-service
    metrics_path: /metrics
    static_configs:
      - targets:
          - gateway-service:8085
        labels:
          service: gateway-service

  # ── Infrastructure ─────────────────────────────────────────────────────────
  - job_name: rabbitmq
    metrics_path: /metrics
    static_configs:
      - targets:
          - dating-bot-rabbitmq:15692
        labels:
          service: rabbitmq

  # ── Prometheus self-monitoring ─────────────────────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
        labels:
          service: prometheus
